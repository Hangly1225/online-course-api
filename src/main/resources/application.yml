server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ocms_db
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: "your-super-secret-key-your-super-secret-key-your-super-secret-key"
  expiration: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html